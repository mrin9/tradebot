<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1350" width="100%" height="100%" style="background-color:#F8FAFC; font-family:'Segoe UI', Arial, sans-serif;">
    <defs>
        <!-- Gradients -->
        <linearGradient id="gradPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradSecondary" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradTertiary" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradSuccess" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradDark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#475569;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
        </linearGradient>

        <!-- Drop Shadow -->
        <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
            <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#0F172A" flood-opacity="0.10" />
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.05" />
        </filter>

        <!-- Solid Drop Shadow for solid objects -->
        <filter id="solidShadow">
            <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.15" />
        </filter>

        <!-- Arrowheads -->
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
        </marker>
        <marker id="arrowHighlight" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
        </marker>
    </defs>

    <!-- Header Section -->
    <rect x="0" y="0" width="1100" height="120" fill="url(#gradDark)" />
    <path d="M 0 120 Q 550 160 1100 120 Z" fill="url(#gradDark)" opacity="0.3" />
    <text x="550" y="55" font-size="36" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="1">Trade Bot Engine: MTFA Workflow</text>
    <text x="550" y="90" font-size="18" font-weight="400" text-anchor="middle" fill="#94A3B8" letter-spacing="0.5">High-Fidelity Business Process Model Notation (BPMN)</text>

    <!-- Grid / Background Overlay -->
    <g opacity="0.05">
        <path d="M 100 150 L 100 1350 M 200 150 L 200 1350 M 300 150 L 300 1350 M 400 150 L 400 1350 M 500 150 L 500 1350 M 600 150 L 600 1350 M 700 150 L 700 1350 M 800 150 L 800 1350 M 900 150 L 900 1350 M 1000 150 L 1000 1350" stroke="#000" stroke-width="1"/>
        <path d="M 0 200 L 1100 200 M 0 300 L 1100 300 M 0 400 L 1100 400 M 0 500 L 1100 500 M 0 600 L 1100 600 M 0 700 L 1100 700 M 0 800 L 1100 800 M 0 900 L 1100 900 M 0 1000 L 1100 1000 M 0 1100 L 1100 1100 M 0 1200 L 1100 1200 M 0 1300 L 1100 1300" stroke="#000" stroke-width="1"/>
    </g>

    <!-- Data Stream / Starting Point -->
    <g transform="translate(425, 170)">
        <circle cx="125" cy="50" r="45" fill="none" stroke="url(#gradPrimary)" stroke-width="6" filter="url(#solidShadow)"/>
        <circle cx="125" cy="50" r="35" fill="none" stroke="url(#gradPrimary)" stroke-width="2"/>
        <path d="M 100 50 L 115 50 L 125 30 L 135 70 L 145 50 L 150 50" fill="none" stroke="url(#gradPrimary)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="125" y="120" font-size="16" font-weight="600" text-anchor="middle" fill="#334155">MARKET STREAM</text>
        <text x="125" y="140" font-size="13" text-anchor="middle" fill="#64748b">(Tick / 1-Min Candle)</text>
    </g>

    <g transform="translate(150, 190)">
        <path d="M 0 20 C 0 0, 200 0, 200 20 L 200 80 C 200 100, 0 100, 0 80 Z" fill="#ffffff" filter="url(#shadow)" stroke="#cbd5e1" stroke-width="1"/>
        <path d="M 0 20 C 0 40, 200 40, 200 20" fill="none" stroke="#e2e8f0" stroke-width="2"/>
        <rect x="20" y="30" width="16" height="4" fill="#6D28D9" rx="2" />
        <rect x="20" y="42" width="24" height="4" fill="#3B82F6" rx="2" />
        <rect x="20" y="54" width="20" height="4" fill="#10B981" rx="2" />
        <text x="200" y="-10" font-size="16" font-weight="600" text-anchor="end" fill="#334155">MongoDB</text>
        <text x="200" y="35" font-size="14" font-weight="600" text-anchor="end" fill="#6D28D9">strategy_indicators</text>
        <text x="200" y="55" font-size="13" text-anchor="end" fill="#64748b">JSON-DSL Schema</text>
        <text x="200" y="75" font-size="13" text-anchor="end" fill="#64748b">Timeframes: [5m, 15m]</text>
    </g>

    <!-- Fund Manager Orchestrator -->
    <g transform="translate(425, 360)">
        <rect x="0" y="0" width="250" height="100" rx="12" fill="#ffffff" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="2"/>
        <!-- Accent line -->
        <rect x="0" y="0" width="250" height="8" rx="4" fill="url(#gradSecondary)"/>
        <!-- Gear Icon -->
        <circle cx="45" cy="50" r="16" fill="none" stroke="url(#gradSecondary)" stroke-width="5" stroke-dasharray="8 4"/>
        <circle cx="45" cy="50" r="8" fill="none" stroke="url(#gradSecondary)" stroke-width="3"/>
        
        <text x="80" y="45" font-size="18" font-weight="700" fill="#334155">Fund Manager</text>
        <text x="80" y="65" font-size="14" fill="#64748b">Central Orchestrator</text>
        <text x="80" y="85" font-size="13" fill="#8B5CF6" font-weight="600">Routes MTFA Engine</text>
    </g>

    <!-- Position Manager SL / TGT Tick Update -->
    <g transform="translate(750, 370)">
        <rect x="0" y="0" width="220" height="80" rx="40" fill="#ffffff" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="1"/>
        <circle cx="40" cy="40" r="20" fill="url(#gradSuccess)" opacity="0.1"/>
        <circle cx="40" cy="40" r="12" fill="none" stroke="url(#gradSuccess)" stroke-width="3"/>
        <text x="75" y="40" font-size="15" font-weight="600" fill="#334155">Position Manager</text>
        <text x="75" y="58" font-size="13" fill="#059669">Risk Check: TGT / SL</text>
    </g>

    <!-- Parallel Split Gateway -->
    <g transform="translate(550, 520)">
        <polygon points="0,-35 35,0 0,35 -35,0" fill="#ffffff" stroke="url(#gradTertiary)" stroke-width="4" filter="url(#solidShadow)"/>
        <!-- Plus sign representing parallel split in BPMN -->
        <path d="M 0 -15 L 0 15 M -15 0 L 15 0" stroke="#D97706" stroke-width="4" stroke-linecap="round"/>
        <text x="45" y="0" font-size="14" font-weight="600" fill="#D97706" alignment-baseline="middle">Spawn Parallel Timeframes</text>
    </g>

    <!-- Multi-Instance Resamplers -->
    <g transform="translate(150, 600)">
        <!-- Box 1: TF 300 -->
        <rect x="0" y="0" width="300" height="150" fill="#f8fafc" rx="8" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4"/>
        <rect x="-10" y="-10" width="300" height="150" fill="#ffffff" rx="8" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="1"/>
        <!-- Multi-instance indicator -->
        <line x1="140" y1="130" x2="140" y2="140" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
        <line x1="150" y1="130" x2="150" y2="140" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
        <line x1="160" y1="130" x2="160" y2="140" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>

        <!-- Clock icon -->
        <circle cx="40" cy="35" r="14" fill="none" stroke="#2563EB" stroke-width="3"/>
        <polyline points="40,25 40,35 48,35" fill="none" stroke="#2563EB" stroke-width="2" stroke-linejoin="round"/>
        
        <text x="70" y="32" font-size="16" font-weight="700" fill="#1e293b">Resampler [TF 300]</text>
        <text x="70" y="50" font-size="13" fill="#64748b">5-Min Aggregation</text>
        
        <rect x="25" y="75" width="230" height="40" fill="#f1f5f9" rx="6" />
        <text x="140" y="100" font-size="14" font-weight="600" text-anchor="middle" fill="#3B82F6">IndicatorCalc [Fast EMA]</text>
    </g>

    <g transform="translate(650, 600)">
        <!-- Box 2: TF 900 -->
        <rect x="0" y="0" width="300" height="150" fill="#f8fafc" rx="8" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4"/>
        <rect x="-10" y="-10" width="300" height="150" fill="#ffffff" rx="8" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="1"/>
        <line x1="140" y1="130" x2="140" y2="140" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
        <line x1="150" y1="130" x2="150" y2="140" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
        <line x1="160" y1="130" x2="160" y2="140" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>

        <!-- Clock icon -->
        <circle cx="40" cy="35" r="14" fill="none" stroke="#D97706" stroke-width="3"/>
        <polyline points="40,25 40,35 45,40" fill="none" stroke="#D97706" stroke-width="2" stroke-linejoin="round"/>
        
        <text x="70" y="32" font-size="16" font-weight="700" fill="#1e293b">Resampler [TF 900]</text>
        <text x="70" y="50" font-size="13" fill="#64748b">15-Min Aggregation</text>
        
        <rect x="25" y="75" width="230" height="40" fill="#f1f5f9" rx="6" />
        <text x="140" y="100" font-size="14" font-weight="600" text-anchor="middle" fill="#D97706">IndicatorCalc [RSI]</text>
    </g>

    <!-- Global State Cache -->
    <g transform="translate(425, 840)">
        <path d="M 0 20 C 0 0, 250 0, 250 20 L 250 80 C 250 100, 0 100, 0 80 Z" fill="#ffffff" filter="url(#shadow)" stroke="url(#gradTertiary)" stroke-width="2"/>
        <path d="M 0 20 C 0 40, 250 40, 250 20" fill="none" stroke="#e2e8f0" stroke-width="1"/>
        <text x="125" y="50" font-size="17" font-weight="700" text-anchor="middle" fill="#D97706">Cache Synchronization</text>
        <text x="125" y="70" font-size="13" font-weight="500" text-anchor="middle" fill="#64748b">Merged `{ema_300: 105, rsi_900: 60}`</text>
    </g>

    <!-- Strategy Evaluator -->
    <g transform="translate(400, 980)">
        <polygon points="30,0 270,0 300,50 270,100 30,100 0,50" fill="#ffffff" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="2"/>
        <!-- Brain/Logic Icon representation -->
        <circle cx="50" cy="50" r="15" fill="none" stroke="#EC4899" stroke-width="4" stroke-dasharray="2"/>
        <circle cx="50" cy="50" r="8" fill="#EC4899" />
        <text x="150" y="45" font-size="18" font-weight="700" text-anchor="middle" fill="#334155">Strategy Evaluator</text>
        <text x="150" y="65" font-size="14" text-anchor="middle" fill="#BE185D">JSON-DSL Engine Parses Rule</text>
        <text x="150" y="85" font-size="12" text-anchor="middle" fill="#64748b">(If "fast_ema" > "slow" AND "rsi" > Target)</text>
    </g>

    <!-- Signal Gateway -->
    <g transform="translate(550, 1140)">
        <polygon points="0,-40 40,0 0,40 -40,0" fill="#ffffff" stroke="url(#gradPrimary)" stroke-width="4" filter="url(#solidShadow)"/>
        <!-- Question Mark -->
        <text x="0" y="6" font-size="24" font-weight="700" text-anchor="middle" fill="#3b82f6" font-family="serif">?</text>
        <text x="-55" y="0" font-size="15" font-weight="600" fill="#3b82f6" text-anchor="end" alignment-baseline="middle">Signal Generated?</text>
    </g>

    <!-- End Events -->
    <g transform="translate(800, 1140)">
        <rect x="-80" y="-20" width="160" height="40" rx="20" fill="#ffffff" filter="url(#solidShadow)" stroke="#94A3B8" stroke-width="2"/>
        <circle cx="-55" cy="0" r="8" fill="#0F172A" />
        <rect x="-58" y="-3" width="6" height="6" fill="#ffffff" />
        <text x="-40" y="5" font-size="15" font-weight="600" fill="#334155">HOLD (Wait)</text>
    </g>

    <g transform="translate(550, 1260)">
        <rect x="-100" y="0" width="200" height="80" rx="8" fill="#ffffff" filter="url(#shadow)" stroke="url(#gradSuccess)" stroke-width="2"/>
        <text x="0" y="32" font-size="18" font-weight="700" text-anchor="middle" fill="#059669">Execution Engine</text>
        <text x="0" y="52" font-size="14" font-weight="600" text-anchor="middle" fill="#10B981">BUY / SELL</text>
        <text x="0" y="70" font-size="12" text-anchor="middle" fill="#64748b">Fire Position/Order Mgr</text>
    </g>

    <g transform="translate(850, 1300)">
        <circle cx="0" cy="0" r="24" fill="#ffffff" filter="url(#solidShadow)" stroke="#059669" stroke-width="4"/>
        <circle cx="0" cy="0" r="16" fill="#059669" />
        <!-- Checkmark inside -->
        <polyline points="-6,2 0,8 8,-4" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="0" y="45" font-size="15" font-weight="600" text-anchor="middle" fill="#059669">Trade Executed</text>
    </g>


    <!-- ================= CONNECTIONS (SEQUENCE FLOWS) ================= -->
    <g fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)" stroke-linejoin="round" stroke-linecap="round">
        
        <!-- Stream -> Fund Manager -->
        <path d="M 550 310 L 550 350" />
        
        <!-- Stream -> PosMgr SL (Dashed) -->
        <path d="M 600 285 L 860 285 L 860 360" stroke="#10B981" stroke-dasharray="8 4" marker-end="url(#arrow)" />
        <text x="730" y="275" font-size="12" font-weight="600" fill="#10B981" stroke="none">Immediate Tick Update</text>

        <!-- DB -> FundManager Strategy Setup (Dashed config line) -->
        <path d="M 250 285 L 420 285 L 420 400 L 415 400" stroke="#6D28D9" stroke-dasharray="6 6" marker-end="url(#arrow)" />
        <text x="210" y="275" font-size="12" font-weight="600" fill="#6D28D9" stroke="none">Configures Engine Routes</text>

        <!-- FundMgr -> Parallel Split -->
        <path d="M 550 465 L 550 480" />

        <!-- Split -> Resamplers -->
        <!-- Splitting left to 300TF -->
        <path d="M 510 520 L 290 520 L 290 590" marker-end="url(#arrowHighlight)" stroke="#3b82f6"/>
        <!-- Splitting right to 900TF -->
        <path d="M 590 520 L 790 520 L 790 590" marker-end="url(#arrowHighlight)" stroke="#3b82f6"/>

        <!-- Resamplers -> Global Cache -->
        <path d="M 290 745 L 290 790 L 510 790 L 510 835" />
        <path d="M 790 745 L 790 790 L 590 790 L 590 835" />
        <text x="320" y="810" font-size="13" font-weight="600" fill="#D97706" stroke="none">Emits "Finalized Candle" event</text>

        <!-- Global Cache -> Strategy Evaluator -->
        <path d="M 550 940 L 550 970" />

        <!-- Strategy Evaluator -> Gateway -->
        <path d="M 550 1085 L 550 1095" />

        <!-- Gateway -> HOLD -->
        <path d="M 595 1140 L 710 1140" />
        
        <!-- Gateway -> Execution -->
        <path d="M 550 1185 L 550 1250" stroke="#10B981" marker-end="url(#arrow)"/>

        <!-- Execution -> Completed -->
        <path d="M 755 1300 L 815 1300" stroke="#059669" />

    </g>

</svg>
